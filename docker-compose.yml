services:
  db:
    image: timescale/timescaledb:2.25.2-pg18
    container_name: irish_rail_db
    environment:
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "9898:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irish_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  daemon:
    image: irish-rail-nabber-daemon:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irish_rail_daemon
    environment:
      DATABASE_URL: postgresql://irish_data:secure_password@db:5432/ireland_public
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./daemon.py:/app/daemon.py
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://api.irishrail.ie/realtime/realtime.asmx/getAllStationsXML', timeout=5)",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: irish-rail-nabber-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: irish_rail_api
    environment:
      DATABASE_URL: postgresql://irish_data:secure_password@db:5432/ireland_public
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: "900"
      JWT_REFRESH_EXPIRY: "604800"
      COOKIE_SECURE: "true"
      CORS_ORIGINS: "https://train.semyon.ie"
      APP_URL: "https://train.semyon.ie"
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_COFFEE_PRICE_ID: ${STRIPE_COFFEE_PRICE_ID:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    image: irish-rail-nabber-dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: irish_rail_dashboard
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: irish_rail_cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
