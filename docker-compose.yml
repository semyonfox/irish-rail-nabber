version: '3.9'

services:
  db:
    image: timescaledb:latest-pg16-alpine
    container_name: irish_rail_db
    environment:
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irish_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irish_rail_daemon
    environment:
      DATABASE_URL: postgresql://irish_data:secure_password@db:5432/ireland_public
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./daemon.py:/app/daemon.py
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
