services:
  db:
    image: timescale/timescaledb:2.25.2-pg18
    container_name: irish_rail_db
    hostname: db
    environment:
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "9898:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irish_data -d ireland_public"]
      interval: 10s
      timeout: 5s
      retries: 5

  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irish_rail_daemon
    environment:
      DATABASE_URL: postgresql://irish_data:secure_password@db:5432/ireland_public
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./daemon.py:/app/daemon.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://api.irishrail.ie/realtime/realtime.asmx/getAllStationsXML', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
