services:
  db:
    image: timescale/timescaledb:2.25.2-pg18
    container_name: irish_rail_db
    environment:
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irish_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  daemon:
    image: irish-rail-nabber-daemon:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: irish_rail_daemon
    environment:
      DATABASE_URL: postgresql://irish_data:secure_password@db:5432/ireland_public
      POSTGRES_USER: irish_data
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: ireland_public
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://api.irishrail.ie/realtime/realtime.asmx/getAllStationsXML', timeout=5)",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: irish-rail-nabber-api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: irish_rail_api
    environment:
      DATABASE_URL: postgresql://irish_data:secure_password@db:5432/ireland_public
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRY: "900"
      JWT_REFRESH_EXPIRY: "604800"
      COOKIE_SECURE: "true"
      CORS_ORIGINS: "https://traein.semyon.ie"
      APP_URL: "https://traein.semyon.ie"
      API_RATE_LIMIT_FREE_TIER_LIMIT: ${API_RATE_LIMIT_FREE_TIER_LIMIT:-25000}
      API_RATE_LIMIT_COFFEE_TIER_LIMIT: ${API_RATE_LIMIT_COFFEE_TIER_LIMIT:-100000}
      API_RATE_LIMIT_UNLIMITED_ROLES: ${API_RATE_LIMIT_UNLIMITED_ROLES:-pro,admin}
      API_RATE_LIMIT_IP_SALT: ${API_RATE_LIMIT_IP_SALT:-rail-salt}
      LLM_API_URL: ${LLM_API_URL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      CHAT_MODEL: ${CHAT_MODEL:-}
      LLM_THINKING: ${LLM_THINKING:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-}
      CHAT_REQUEST_TIMEOUT_SECONDS: ${CHAT_REQUEST_TIMEOUT_SECONDS:-}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-}
      CHAT_MAX_TOKENS: ${CHAT_MAX_TOKENS:-}
      CHAT_MAX_TOOL_ITERATIONS: ${CHAT_MAX_TOOL_ITERATIONS:-3}
      CHAT_MAX_TOOL_CALLS_PER_TURN: ${CHAT_MAX_TOOL_CALLS_PER_TURN:-3}
      CHAT_TOOL_RESULT_MAX_CHARS: ${CHAT_TOOL_RESULT_MAX_CHARS:-3500}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_COFFEE_PRICE_ID: ${STRIPE_COFFEE_PRICE_ID:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  dashboard:
    image: irish-rail-nabber-dashboard:latest
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: irish_rail_dashboard
    depends_on:
      - api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: irish_rail_cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
